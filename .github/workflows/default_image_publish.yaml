name: SDK Docs Artifact Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version label for the docs artifact
        required: false
        default: dev

permissions: {}

env:
  VERSION: ${{ inputs.version || 'dev' }}
  POETRY_VIRTUALENVS_IN_PROJECT: true
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  sdk-docs:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-toolchain
        with:
          install-swag: 'false'
      - name: Generate SDK docs
        run: |
          source "$(poetry env info --path)/bin/activate"
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@v1.1.0
          yarn docs
          tar -czf "sdk-docs-${VERSION}.tar.gz" -C artifacts sdk-docs
      - name: Upload SDK docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sdk-docs-${{ env.VERSION }}
          path: |
            artifacts/sdk-docs
            sdk-docs-${{ env.VERSION }}.tar.gz
          if-no-files-found: error
