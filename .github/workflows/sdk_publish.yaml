name: SDK and CLI Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (start with "v", e.g. v1.2.3 or v1.2.3-alpha.1)'
        required: true
      packages:
        description: 'Packages to publish (comma-separated): typescript,analytics,python,ruby,java,cli'
        required: true
        default: typescript,analytics,python,ruby,java,cli
      prerelease:
        description: 'Prerelease mode: enforce a prerelease version and never publish to a stable/default channel'
        type: boolean
        default: false
      npm_pkg_version:
        description: 'Override npm version (npm format, default: derived from version)'
        required: false
      pypi_pkg_version:
        description: 'Override PyPI version (PEP 440 format, default: derived from version)'
        required: false
      rubygems_pkg_version:
        description: 'Override RubyGems version (RubyGems format, default: derived from version)'
        required: false
      maven_pkg_version:
        description: 'Override Maven version (default: derived from version; use -SNAPSHOT for Java prereleases)'
        required: false
      cli_version:
        description: 'Override CLI version for the Homebrew tap (default: version)'
        required: false
      npm_tag:
        description: 'Override npm dist-tag (default: latest for stable, derived from suffix for prereleases)'
        required: false

permissions: {}

concurrency:
  group: sdk-publish-${{ inputs.version }}
  cancel-in-progress: false

env:
  POETRY_VIRTUALENVS_IN_PROJECT: true

jobs:
  setup:
    if: github.repository == 'daytona/clients'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      has_publishable: ${{ steps.resolve.outputs.has_publishable }}
      publish_cli: ${{ steps.resolve.outputs.publish_cli }}
      npm_version: ${{ steps.resolve.outputs.npm_version }}
      pypi_version: ${{ steps.resolve.outputs.pypi_version }}
      rubygems_version: ${{ steps.resolve.outputs.rubygems_version }}
      maven_version: ${{ steps.resolve.outputs.maven_version }}
      cli_version: ${{ steps.resolve.outputs.cli_version }}
      npm_tag: ${{ steps.resolve.outputs.npm_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/validate-version
        with:
          version: ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
      - name: Resolve packages, versions and guardrails
        id: resolve
        env:
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
          PACKAGES: ${{ inputs.packages }}
          NPM_PKG_VERSION_OVERRIDE: ${{ inputs.npm_pkg_version }}
          PYPI_PKG_VERSION_OVERRIDE: ${{ inputs.pypi_pkg_version }}
          RUBYGEMS_PKG_VERSION_OVERRIDE: ${{ inputs.rubygems_pkg_version }}
          MAVEN_PKG_VERSION_OVERRIDE: ${{ inputs.maven_pkg_version }}
          CLI_VERSION_OVERRIDE: ${{ inputs.cli_version }}
          NPM_TAG_OVERRIDE: ${{ inputs.npm_tag }}
        run: bash ./.github/scripts/resolve-publish-versions.sh

  publish:
    needs: setup
    if: needs.setup.outputs.has_publishable == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    permissions:
      contents: read
    name: Publish ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      VERSION: ${{ inputs.version }}
      NPM_PKG_VERSION: ${{ needs.setup.outputs.npm_version }}
      PYPI_PKG_VERSION: ${{ needs.setup.outputs.pypi_version }}
      RUBYGEMS_PKG_VERSION: ${{ needs.setup.outputs.rubygems_version }}
      MAVEN_PKG_VERSION: ${{ needs.setup.outputs.maven_version }}
      NPM_TAG: ${{ needs.setup.outputs.npm_tag }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_SIGNING_KEY: ${{ secrets.MAVEN_GPG_SIGNING_KEY }}
      MAVEN_GPG_SIGNING_PASSWORD: ${{ secrets.MAVEN_GPG_SIGNING_PASSWORD }}
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-tags: true
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-toolchain
        with:
          install-swag: 'false'
      - name: Configure RubyGems credentials
        if: matrix.projects == 'sdk-ruby'
        run: |
          mkdir -p ~/.gem
          echo "---" > ~/.gem/credentials
          echo ":rubygems_api_key: $RUBYGEMS_API_KEY" >> ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
      - name: Publish projects
        run: |
          source "$(poetry env info --path)/bin/activate"
          yarn nx run-many --target=publish --projects=${{ matrix.projects }}
      - name: Cleanup credentials
        if: always()
        run: rm -f ~/.gem/credentials 2>/dev/null || true

  update-homebrew-tap:
    needs: setup
    if: ${{ github.repository == 'daytona/clients' && needs.setup.outputs.publish_cli == 'true' && inputs.prerelease == false }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions: {}
    name: Update Homebrew CLI tap
    steps:
      - name: Update version
        env:
          GITHUBBOT_TOKEN: ${{ secrets.GITHUBBOT_TOKEN }}
          CLI_VERSION: ${{ needs.setup.outputs.cli_version }}
        run: |
          curl -f -X POST -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUBBOT_TOKEN}" \
            https://api.github.com/repos/daytonaio/homebrew-cli/dispatches \
            -d "{\"event_type\": \"update-version\", \"client_payload\": {\"version\": \"$CLI_VERSION\"}}"
