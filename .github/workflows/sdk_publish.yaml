name: SDK and CLI Publish

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Prerelease mode — never publish to latest/stable channels'
        type: boolean
        default: false
      version:
        description: 'Version to release (start with "v") — default for every package. The "v" is dropped for npm/PyPI/RubyGems/Maven and kept for the CLI. Leave blank and fill only the language fields below to publish a subset; a language field overrides this default.'
        required: false
      npm_version:
        description: 'npm version — e.g. 0.190.0-alpha.3'
        required: false
      npm_tag:
        description: 'npm dist-tag'
        type: choice
        options:
          - latest
          - rc
          - alpha
          - beta
        default: latest
      pypi_version:
        description: 'PyPI version — e.g. 0.192.0a1'
        required: false
      rubygems_version:
        description: 'RubyGems version — e.g. 0.190.0.alpha.3'
        required: false
      maven_version:
        description: 'Maven version — e.g. 0.190.2-SNAPSHOT'
        required: false
      cli_version:
        description: 'CLI version — e.g. v0.190.0'
        required: false

permissions: {}

concurrency:
  group: sdk-publish
  cancel-in-progress: false

env:
  POETRY_VIRTUALENVS_IN_PROJECT: true

jobs:
  setup:
    if: github.repository == 'daytona/clients'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      has_publishable: ${{ steps.resolve.outputs.has_publishable }}
      publish_cli: ${{ steps.resolve.outputs.publish_cli }}
      npm_version: ${{ steps.resolve.outputs.npm_version }}
      pypi_version: ${{ steps.resolve.outputs.pypi_version }}
      rubygems_version: ${{ steps.resolve.outputs.rubygems_version }}
      maven_version: ${{ steps.resolve.outputs.maven_version }}
      cli_version: ${{ steps.resolve.outputs.cli_version }}
      npm_tag: ${{ steps.resolve.outputs.npm_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Resolve packages and guardrails
        id: resolve
        env:
          VERSION: ${{ inputs.version }}
          NPM_OVERRIDE: ${{ inputs.npm_version }}
          PYPI_OVERRIDE: ${{ inputs.pypi_version }}
          RUBYGEMS_OVERRIDE: ${{ inputs.rubygems_version }}
          MAVEN_OVERRIDE: ${{ inputs.maven_version }}
          CLI_OVERRIDE: ${{ inputs.cli_version }}
          NPM_TAG: ${{ inputs.npm_tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: bash ./.github/scripts/resolve-publish-versions.sh

  publish:
    needs: setup
    if: needs.setup.outputs.has_publishable == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    permissions:
      contents: read
    name: Publish ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      NPM_PKG_VERSION: ${{ needs.setup.outputs.npm_version }}
      PYPI_PKG_VERSION: ${{ needs.setup.outputs.pypi_version }}
      RUBYGEMS_PKG_VERSION: ${{ needs.setup.outputs.rubygems_version }}
      MAVEN_PKG_VERSION: ${{ needs.setup.outputs.maven_version }}
      NPM_TAG: ${{ needs.setup.outputs.npm_tag }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_SIGNING_KEY: ${{ secrets.MAVEN_GPG_SIGNING_KEY }}
      MAVEN_GPG_SIGNING_PASSWORD: ${{ secrets.MAVEN_GPG_SIGNING_PASSWORD }}
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-tags: true
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-toolchain
        with:
          install-swag: 'false'
      - name: Configure RubyGems credentials
        if: matrix.projects == 'sdk-ruby'
        run: |
          mkdir -p ~/.gem
          echo "---" > ~/.gem/credentials
          echo ":rubygems_api_key: $RUBYGEMS_API_KEY" >> ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
      - name: Publish projects
        run: |
          source "$(poetry env info --path)/bin/activate"
          yarn nx run-many --target=publish --projects=${{ matrix.projects }}
      - name: Cleanup credentials
        if: always()
        run: rm -f ~/.gem/credentials 2>/dev/null || true

  update-homebrew-tap:
    needs: setup
    if: ${{ github.repository == 'daytona/clients' && needs.setup.outputs.publish_cli == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions: {}
    name: Update Homebrew CLI tap
    steps:
      - name: Update version
        env:
          GITHUBBOT_TOKEN: ${{ secrets.GITHUBBOT_TOKEN }}
          CLI_VERSION: ${{ needs.setup.outputs.cli_version }}
          EVENT_TYPE: ${{ inputs.prerelease == true && 'update-version-rc' || 'update-version' }}
        run: |
          curl -f -X POST -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUBBOT_TOKEN}" \
            https://api.github.com/repos/daytonaio/homebrew-cli/dispatches \
            -d "{\"event_type\": \"${EVENT_TYPE}\", \"client_payload\": {\"version\": \"$CLI_VERSION\"}}"
