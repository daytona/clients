name: Deploy Go vanity Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'daytona/clients'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DOMAIN: go.daytona.io
      REPO: daytona/clients
      BRANCH: main
      # Set to "true" only after DNS for $DOMAIN points at GitHub Pages.
      EMIT_CNAME: 'false'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Generate vanity site
        run: bash hack/go-vanity/generate-site.sh
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: hack/go-vanity/site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
