name: '[PR] Devcontainer build'

on:
  pull_request:
    paths:
      - '.devcontainer/**'
      - '.github/actions/setup-toolchain/**'
      - '.github/workflows/pr_docker_build.yaml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILDX_NO_DEFAULT_ATTESTATIONS: 1

jobs:
  devcontainer-build:
    name: Devcontainer Docker build
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Build devcontainer image
        run: docker build --build-arg TARGETARCH=amd64 -f .devcontainer/Dockerfile .devcontainer
